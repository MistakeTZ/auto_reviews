version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=${DB_URL}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - BOT_WEBHOOK_BASE_URL=${BOT_WEBHOOK_BASE_URL}
      - BOT_WEBHOOK_SECRET=${BOT_WEBHOOK_SECRET}
    depends_on:
      db:
        condition: service_healthy
  controller:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "backend.run_controller"]
    environment:
      - DATABASE_URL=${DB_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  bots:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "backend/bot.py"]
    environment:
      - DATABASE_URL=${DB_URL}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - BOT_WEBHOOK_BASE_URL=${BOT_WEBHOOK_BASE_URL}
      - BOT_WEBHOOK_SECRET=${BOT_WEBHOOK_SECRET}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    depends_on:
      - backend

volumes:
  postgres_data:
