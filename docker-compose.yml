version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: autoreviews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d autoreviews"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/autoreviews
    depends_on:
      db:
        condition: service_healthy
  controller:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "backend.run_controller"]
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/autoreviews
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8002/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
