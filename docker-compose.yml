services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DB_URL}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - BOT_WEBHOOK_BASE_URL=${BOT_WEBHOOK_BASE_URL}
      - BOT_WEBHOOK_SECRET=${BOT_WEBHOOK_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SQLADMIN_USERNAME=${SQLADMIN_USERNAME}
      - SQLADMIN_PASSWORD=${SQLADMIN_PASSWORD}
      - SQLADMIN_SECRET_KEY=${SQLADMIN_SECRET_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - python_site_packages:/usr/local/lib/python3.11/site-packages
    depends_on:
      db:
        condition: service_healthy
  controller:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "backend.run_controller"]
    environment:
      - DATABASE_URL=${DB_URL}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
    volumes:
      - python_site_packages:/usr/local/lib/python3.11/site-packages
    depends_on:
      db:
        condition: service_healthy

  bots:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "backend/bot.py"]
    environment:
      - DATABASE_URL=${DB_URL}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - BOT_WEBHOOK_BASE_URL=${BOT_WEBHOOK_BASE_URL}
      - BOT_WEBHOOK_SECRET=${BOT_WEBHOOK_SECRET}
    volumes:
      - python_site_packages:/usr/local/lib/python3.11/site-packages
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - MAX_BOT_NAME=${MAX_BOT_NAME:-none}
      - TG_BOT_NAME=${TG_BOT_NAME:-none}
    volumes:
      - node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  node_modules:
  python_site_packages:
