server {
    listen 80;
    resolver 127.0.0.11 valid=30s ipv6=off;

    set $x_forwarded_proto $http_x_forwarded_proto;
    if ($x_forwarded_proto = "") {
        set $x_forwarded_proto $scheme;
    }

    set $backend_upstream http://backend:8000;
    set $frontend_upstream http://frontend:3000;

    # Backend: API and SQLAdmin
    location /api/ {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;
    }

    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;

        # Rewrite Location headers so backend's internal redirects
        # (/admin -> /admin/) are not exposed to the browser with
        # the internal hostname.
        proxy_redirect     http://backend:8000/ /;
    }

    # Bot webhooks
    location /api/bot/ {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;
    }

    # Everything else goes to Next.js frontend
    location / {
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }
}
