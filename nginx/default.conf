# Server block for reanswer.ru (Main App)
server {
    listen 80 default_server;
    server_name reanswer.ru www.reanswer.ru localhost;
    resolver 127.0.0.11 valid=30s ipv6=off;

    set $x_forwarded_proto $http_x_forwarded_proto;
    if ($x_forwarded_proto = "") {
        set $x_forwarded_proto $scheme;
    }

    set $x_forwarded_host $http_x_forwarded_host;
    if ($x_forwarded_host = "") {
        set $x_forwarded_host $http_host;
    }

    set $x_forwarded_port $http_x_forwarded_port;
    if ($x_forwarded_port = "") {
        set $x_forwarded_port $server_port;
    }

    set $backend_upstream http://backend:8000;
    set $frontend_upstream http://frontend:3000;

    # Redirect spam paths to the spam subdomain (strip /spam prefix)
    location = /spam {
        return 301 $x_forwarded_proto://spam.reanswer.ru/;
    }

    location ^~ /spam/ {
        rewrite ^/spam/(.*)$ $x_forwarded_proto://spam.reanswer.ru/$1 permanent;
    }

    # Backend: API and SQLAdmin
    location /api/ {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $x_forwarded_host;
        proxy_set_header   X-Forwarded-Port  $x_forwarded_port;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;
    }

    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $x_forwarded_host;
        proxy_set_header   X-Forwarded-Port  $x_forwarded_port;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;

        # Rewrite Location headers so backend's internal redirects
        # (/admin -> /admin/) are not exposed to the browser with
        # the internal hostname.
        proxy_redirect     http://backend:8000/ /;
    }

    # Bot webhooks
    location /api/bot/ {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $x_forwarded_host;
        proxy_set_header   X-Forwarded-Port  $x_forwarded_port;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;
    }

    # Everything else goes to Next.js frontend
    location / {
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $x_forwarded_host;
        proxy_set_header   X-Forwarded-Port  $x_forwarded_port;
        proxy_set_header   X-Forwarded-Proto $x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }
}

